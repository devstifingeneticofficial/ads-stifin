name: Sync Fork From Upstream

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  repository_dispatch:
    types: [upstream_push]

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve upstream repository
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          UPSTREAM_REPO="${{ vars.UPSTREAM_REPO }}"

          if [ -z "$UPSTREAM_REPO" ]; then
            API_URL="https://api.github.com/repos/${{ github.repository }}"
            UPSTREAM_REPO="$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "$API_URL" | jq -r '.parent.full_name // empty')"
          fi

          if [ -z "$UPSTREAM_REPO" ]; then
            echo "Missing upstream repository source."
            echo "Set repository variable UPSTREAM_REPO='<owner>/<repo>' OR make sure this repo is a fork with parent info."
            exit 1
          fi

          echo "Using upstream repo: $UPSTREAM_REPO"
          echo "repo=$UPSTREAM_REPO" >> "$GITHUB_OUTPUT"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync default branch from upstream
        env:
          TARGET_BRANCH: ${{ github.event.repository.default_branch }}
          UPSTREAM_REPO: ${{ steps.upstream.outputs.repo }}
        run: |
          git remote add upstream "https://github.com/$UPSTREAM_REPO.git"
          git fetch upstream "$TARGET_BRANCH"
          git checkout "$TARGET_BRANCH"

          BEFORE_SHA="$(git rev-parse HEAD)"
          git merge --ff-only "upstream/$TARGET_BRANCH"
          AFTER_SHA="$(git rev-parse HEAD)"

          if [ "$BEFORE_SHA" = "$AFTER_SHA" ]; then
            echo "Already up to date with upstream/$TARGET_BRANCH"
            exit 0
          fi

          git push origin "$TARGET_BRANCH"
