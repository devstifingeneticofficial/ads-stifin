name: Sync Fork From Upstream

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  repository_dispatch:
    types: [upstream_push]

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required upstream repo variable
        run: |
          if [ -z "${{ vars.UPSTREAM_REPO }}" ]; then
            echo "Missing repository variable: UPSTREAM_REPO"
            echo "Set it to '<owner>/<repo>' of the upstream source."
            exit 1
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync default branch from upstream
        env:
          TARGET_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git remote add upstream "https://github.com/${{ vars.UPSTREAM_REPO }}.git"
          git fetch upstream "$TARGET_BRANCH"
          git checkout "$TARGET_BRANCH"

          BEFORE_SHA="$(git rev-parse HEAD)"
          git merge --ff-only "upstream/$TARGET_BRANCH"
          AFTER_SHA="$(git rev-parse HEAD)"

          if [ "$BEFORE_SHA" = "$AFTER_SHA" ]; then
            echo "Already up to date with upstream/$TARGET_BRANCH"
            exit 0
          fi

          git push origin "$TARGET_BRANCH"

